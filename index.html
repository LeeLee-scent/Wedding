<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a368; --cream-bg: #fdfaf5; --text-dark: #5d4037; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Noto Serif TC', serif; overflow-x: hidden; }

        /* --- 高級信封開場結構 --- */
        #envelope-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 9999;
            perspective: 2500px;
            background: #fff; 
            transition: opacity 1.8s ease 3s, visibility 1.8s ease 3s; 
        }

        /* 1. 底部背景層：改回使用圖片 */
        .envelope-back {
            position: absolute;
            width: 100%; height: 100%;
            background: url('assets/envelope-back.jpg') center/cover no-repeat;
            z-index: 1;
        }

        /* 2. 下半部三角形 (比例較大，顯示文字) */
        .envelope-bottom-flap {
            position: absolute;
            bottom: 0; width: 100%; height: 65%;
            background: #fff url('assets/envelope-bottom.png') center top/cover;
            z-index: 10;
            clip-path: polygon(0 35%, 50% 0, 100% 35%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-top: 120px;
            /* 邊緣陰影：向上投射，增加疊在上蓋下方的層次感 */
            filter: drop-shadow(0 -10px 15px rgba(0,0,0,0.08));
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1) 1s;
        }

        /* 3. 上半部群組 (上蓋與封蠟聯動) */
        .envelope-top-group {
            position: absolute;
            top: 0; width: 100%; height: 45%; 
            z-index: 25;
            transform-origin: top;
            transition: transform 3.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope-top-flap {
            position: absolute;
            width: 100%; height: 100%;
            background: #fff url('assets/envelope-top.png') center bottom/cover;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            /* 下向陰影：確保疊在下蓋上方時有立體感 */
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15)); 
        }

        /* 4. 封蠟 (放大並黏著上蓋) */
        .seal-btn {
            position: absolute;
            bottom: -78px; 
            left: 50%;
            transform: translateX(-50%);
            width: 155px; 
            cursor: pointer;
            z-index: 30;
            transition: opacity 1.5s ease 2s; 
        }

        /* --- 點擊後的動畫 --- */
        .opened .envelope-top-group { 
            transform: rotateX(160deg); /* 緩慢向後上方翻開 */
        }
        
        .opened .seal-btn { 
            opacity: 0; 
        }

        .opened .envelope-bottom-flap { 
            transform: translateY(100%); /* 緩慢向下劃出 */
        }

        .opened#envelope-wrapper { 
            opacity: 0; 
            visibility: hidden; 
        }

        /* --- 主內容視覺 --- */
        #main-content { opacity: 0; transition: opacity 2s ease 2.5s; }
        .visible#main-content { opacity: 1; }

        #hero-section { 
            height: 100vh; width: 100%; 
            background: url('assets/hero-photo.jpg') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<audio id="bgm" loop><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

<!-- 信封層 -->
<div id="envelope-wrapper" onclick="startWedding()">
    <!-- 第一層：封底圖片 -->
    <div class="envelope-back"></div>
    
    <!-- 第二層：上半部群組 -->
    <div class="envelope-top-group">
        <div class="envelope-top-flap"></div>
        <img src="assets/seal.png" class="seal-btn" alt="Seal">
    </div>
    
    <!-- 第三層：下半部 -->
    <div class="envelope-bottom-flap">
        <h2 style="font-size: 1.6rem; color: #a89486; font-weight: 400; letter-spacing: 2px; text-align: center; padding: 0 20px;">Te invitamos a nuestro gran día</h2>
        <p style="font-size: 1.1rem; color: #a89486; margin-top: 15px; letter-spacing: 3px;">2026.10.03</p>
    </div>
</div>

<!-- 婚禮主要內容 -->
<main id="main-content">
    <section id="hero-section">
        <h1 style="font-family: 'Dancing Script', cursive; font-size: 4.5rem; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.4);">An & Chi</h1>
        <p style="color: white; letter-spacing: 5px; font-weight: 300;">SAVE THE DATE</p>
    </section>
</main>

<script>
    function startWedding() {
        const wrapper = document.getElementById('envelope-wrapper');
        const mainContent = document.getElementById('main-content');
        
        if (!wrapper.classList.contains('opened')) {
            wrapper.classList.add('opened');
            
            // 播放背景音樂
            const bgm = document.getElementById('bgm');
            bgm.play().catch(()=>{});

            // 啟動主內容淡入效果
            mainContent.classList.add('visible');

            // 6秒後移除信封層以利操作
            setTimeout(() => {
                wrapper.style.display = 'none';
            }, 6500);
        }
    }
</script>

</body>
</html>
