<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Zhi+Mang+Xing&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wood-base: #5d4037;
            --gold: #c5a368; 
            --cream-bg: #fdfaf5;
        }
        
        * { box-sizing: border-box; } /* 防止 Padding 撐破寬度 */

        body, html { margin: 0; padding: 0; background: var(--cream-bg); font-family: 'Noto Serif TC', serif; overflow-x: hidden; }
        
        #bg-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        section { min-height: 80vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 1; padding: 20px; opacity: 0; transform: translateY(20px); transition: 1s ease-out; }
        section.show { opacity: 1; transform: translateY(0); }

        /* --- 第一部分：純 CSS 木紋 --- */
        #part1 { background: #2c1b18; z-index: 10; min-height: 100vh; padding: 0; opacity: 1; transform: none; }
        .door { 
            height: 50%; width: 100%; z-index: 20;
            /* 使用 CSS 繪製木頭紋理 */
            background-color: #795548;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.2) 1px, rgba(0,0,0,0.2) 2px),
                              repeating-linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.05) 1px, transparent 1px, transparent 2px);
            transition: transform 2.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .door-top { border-bottom: 2px solid #3e2723; align-items: flex-end; padding-bottom: 40px; }
        .door-bottom { border-top: 2px solid #3e2723; align-items: flex-start; padding-top: 40px; }
        
        /* 響應式文字：使用 clamp 防止跑版 */
        .door-label { color: rgba(255,255,255,0.7); letter-spacing: 0.5rem; font-family: 'Dancing Script', cursive; font-size: clamp(1rem, 5vw, 1.5rem); }
        
        .opened .door-top { transform: translateY(-100%); }
        .opened .door-bottom { transform: translateY(100%); }

        .hero-img { 
            position: absolute; width: 100%; height: 100%; 
            background: url('assets/hero-photo.jpg') center/cover; 
            opacity: 0; transition: opacity 3s ease 1s; 
        }
        .opened .hero-img { opacity: 0.6; }
        .hero-text { 
            position: absolute; text-align: center; z-index: 15; color: white; width: 90%;
            opacity: 0; transition: 2.5s ease 2s; 
        }
        .opened .hero-text { opacity: 1; }
        .hero-text h2 { font-family: 'Dancing Script', cursive; font-size: clamp(2.5rem, 10vw, 4rem); margin: 0; }

        /* --- 第二部分：刮刮樂 --- */
        #scratch-container {
            position: relative; width: 90vw; max-width: 400px; aspect-ratio: 1/1.2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); background: #fff; overflow: hidden;
        }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; width: 100%; height: 100%; }

        /* --- 第三部分：純 CSS 大理石質感 --- */
        #part3 { 
            /* 模擬大理石紋路 */
            background: linear-gradient(135deg, #fdfaf5 25%, transparent 25%) -50px 0,
                        linear-gradient(225deg, #fdfaf5 25%, transparent 25%) -50px 0,
                        linear-gradient(315deg, #fdfaf5 25%, transparent 25%),
                        linear-gradient(45deg, #fdfaf5 25%, transparent 25%);
            background-size: 100px 100px;
            background-color: #f5f1e9;
        }
        .invitation-frame { 
            padding: 40px 20px; width: 95%; max-width: 420px; 
            background: rgba(255,255,255,0.85); border: 1px solid var(--gold); 
            text-align: center; backdrop-filter: blur(5px);
        }
        .invitation-frame p { 
            font-size: clamp(0.9rem, 4vw, 1.1rem); 
            line-height: 2; word-break: keep-all; 
        }

    </style>
</head>
<body>

    <canvas id="bg-effect"></canvas>
    <audio id="bgm" loop preload="auto"><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

    <section id="part1">
        <div class="door-overlay" onclick="startExperience(this)" style="position: absolute; width: 100%; height: 100%; z-index: 30; cursor: pointer;">
            <div class="door door-top"><div class="door-label">THE JOURNEY BEGINS</div></div>
            <div class="door door-bottom"><div class="door-label">LIN & LEE</div></div>
        </div>
        <div class="hero-img" id="hero-img"></div>
        <div class="hero-text">
            <h2>Lin & Lee</h2>
            <p style="letter-spacing: 4px; font-size: 1.1rem;">2026 . 10 . 03</p>
        </div>
    </section>

    <section id="part2">
        <div id="scratch-container">
            <div style="width:100%; height:100%;" id="photo-content">
                <img src="assets/main-image.jpg" style="width:100%; height:82%; object-fit:cover;">
                <div style="height:18%; display:flex; justify-content:center; align-items:center; gap:10px; background:white;">
                    <div style="text-align:center;"><span id="days" style="font-weight:bold;font-size:1.1rem;">00</span><br><small>DAYS</small></div>
                    <div style="text-align:center;"><span id="hours" style="font-weight:bold;font-size:1.1rem;">00</span><br><small>HRS</small></div>
                    <div style="text-align:center;"><span id="mins" style="font-weight:bold;font-size:1.1rem;">00</span><br><small>MINS</small></div>
                    <div style="text-align:center;"><span id="secs" style="font-weight:bold;font-size:1.1rem;">00</span><br><small>SECS</small></div>
                </div>
            </div>
            <canvas id="scratch-canvas"></canvas>
        </div>
    </section>

    <section id="part3">
        <div class="invitation-frame">
            <div style="font-family: 'Zhi Mang Xing', cursive; font-size: clamp(2.5rem, 8vw, 3.5rem); color: #7a3e3e; margin-bottom: 15px;">誠摯邀請</div>
            <p><strong>林建安 & 李抒琪</strong></p>
            <p>
                在台東海邊遇見了你<br>
                從此我們的世界有了旋律<br>
                誠摯邀請您見證我們的幸福時刻<br><br>
                <strong>2026 年 10 月 03 日</strong><br>
                18:30 入席 | 八德彭園會館
            </p>
        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('section').forEach(s => observer.observe(s));

        function startExperience(el) {
            el.parentElement.classList.add('opened');
            document.getElementById('bgm').play().catch(()=>{});
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        // --- 刮刮樂優化 ---
        const scCanvas = document.getElementById('scratch-canvas');
        const scCtx = scCanvas.getContext('2d');
        const scContainer = document.getElementById('scratch-container');

        function initScratch() {
            scCanvas.width = scContainer.offsetWidth;
            scCanvas.height = scContainer.offsetHeight;
            const g = scCtx.createLinearGradient(0,0,scCanvas.width,scCanvas.height);
            g.addColorStop(0, '#bdc3c7'); g.addColorStop(1, '#95a5a6');
            scCtx.fillStyle = g; scCtx.fillRect(0,0,scCanvas.width,scCanvas.height);
            scCtx.fillStyle = '#444'; scCtx.font = '24px "Zhi Mang Xing"'; scCtx.textAlign='center';
            scCtx.fillText('刮開揭曉驚喜', scCanvas.width/2, scCanvas.height/2);
        }
        window.onload = initScratch;

        function scratch(e) {
            const r = scCanvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - r.left;
            const y = (e.clientY || e.touches[0].clientY) - r.top;
            scCtx.globalCompositeOperation = 'destination-out';
            scCtx.beginPath(); scCtx.arc(x, y, 30, 0, Math.PI*2); scCtx.fill();
        }
        scCanvas.addEventListener('touchmove', e => { scratch(e); e.preventDefault(); }, {passive: false});
        scCanvas.addEventListener('mousemove', e => { if(e.buttons===1) scratch(e); });

        function updateTimer() {
            const diff = new Date('2026-10-03T12:00:00') - new Date();
            if (diff <= 0) return;
            document.getElementById('days').innerText = String(Math.floor(diff/864e5)).padStart(2,'0');
            document.getElementById('hours').innerText = String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
            document.getElementById('mins').innerText = String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
            document.getElementById('secs').innerText = String(Math.floor((diff%6e4)/1000)).padStart(2,'0');
        }
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
