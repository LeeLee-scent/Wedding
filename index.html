<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>An & Chi Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a368; --cream-bg: #fdfaf5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Noto Serif TC', serif; overflow-x: hidden; }

        #envelope-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 9999;
            perspective: 3000px; /* 增加透視深度 */
            background: #fff; 
            transition: opacity 1.8s ease 3s, visibility 1.8s ease 3s; 
        }

        /* 1. 封底：作為基底層 */
        .envelope-back {
            position: absolute;
            width: 100%; height: 100%;
            background: url('assets/envelope-back.jpg') center/cover no-repeat;
            z-index: 1;
        }

        /* 2. 下半部三角形：強化邊緣立體陰影 */
        .envelope-bottom-flap {
            position: absolute;
            bottom: 0; width: 100%; height: 65%;
            background: #fff url('assets/envelope-bottom.png') center top/cover;
            z-index: 10;
            clip-path: polygon(0 35%, 50% 0, 100% 35%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-top: 120px;
            /* 多重陰影加強厚度感 */
            filter: drop-shadow(0 -5px 10px rgba(0,0,0,0.15)) 
                    drop-shadow(0 -15px 30px rgba(0,0,0,0.1));
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1) 1s;
        }

        /* 3. 上半部群組：翻轉動作主體 */
        .envelope-top-group {
            position: absolute;
            top: 0; width: 100%; height: 45%; 
            z-index: 25;
            transform-origin: top;
            transition: transform 3.8s cubic-bezier(0.4, 0, 0.2, 1); /* 速度稍微放得更慢 */
        }

        .envelope-top-flap {
            position: absolute;
            width: 100%; height: 100%;
            background: #fff url('assets/envelope-top.png') center bottom/cover;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            /* 針對上蓋尖端強化向下陰影，讓它「壓」在下半部上方 */
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)) 
                    drop-shadow(0 25px 40px rgba(0,0,0,0.15)); 
        }

        /* 4. 封蠟：極致放大與懸浮感 */
        .seal-btn {
            position: absolute;
            bottom: -85px; /* 根據放大後的比例微調位置 */
            left: 50%;
            transform: translateX(-50%);
            width: 170px; /* 再次放大封蠟尺寸 */
            cursor: pointer;
            z-index: 30;
            /* 封蠟專屬的圓形重陰影，增加厚度感 */
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.3));
            transition: opacity 1.5s ease 2.2s, transform 0.5s ease;
        }
        
        .seal-btn:active { transform: translateX(-50%) scale(0.95); }

        /* --- 動態開啟效果 --- */
        .opened .envelope-top-group { 
            transform: rotateX(155deg); 
        }
        
        .opened .seal-btn { 
            opacity: 0; 
        }

        .opened .envelope-bottom-flap { 
            transform: translateY(100%); 
        }

        .opened#envelope-wrapper { 
            opacity: 0; 
            visibility: hidden; 
        }

        /* 主內容樣式 */
        #main-content { opacity: 0; transition: opacity 2.5s ease 2.5s; }
        .visible#main-content { opacity: 1; }

        #hero-section { 
            height: 100vh; width: 100%; 
            background: url('assets/hero-photo.jpg') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<audio id="bgm" loop><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

<div id="envelope-wrapper" onclick="startWedding()">
    <div class="envelope-back"></div>
    
    <div class="envelope-top-group">
        <div class="envelope-top-flap"></div>
        <img src="assets/seal.png" class="seal-btn" alt="Seal">
    </div>
    
    <div class="envelope-bottom-flap">
        <h2 style="font-size: 1.6rem; color: #a89486; font-weight: 400; letter-spacing: 2px; text-align: center;">Te invitamos a nuestro gran día</h2>
        <p style="font-size: 1.1rem; color: #a89486; margin-top: 15px; letter-spacing: 3px;">2026.10.03</p>
    </div>
</div>

<main id="main-content">
    <section id="hero-section">
        <h1 style="font-family: 'Dancing Script', cursive; font-size: 4.5rem; color: white; text-shadow: 0 4px 20px rgba(0,0,0,0.5);">An & Chi</h1>
    </section>
</main>

<script>
    function startWedding() {
        const wrapper = document.getElementById('envelope-wrapper');
        const mainContent = document.getElementById('main-content');
        
        if (!wrapper.classList.contains('opened')) {
            wrapper.classList.add('opened');
            const bgm = document.getElementById('bgm');
            bgm.play().catch(()=>{});
            mainContent.classList.add('visible');
            setTimeout(() => { wrapper.style.display = 'none'; }, 6500);
        }
    }
</script>

</body>
</html>
