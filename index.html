<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --burgundy: #800020; --cream: #fffcf9; }
        body, html { margin: 0; padding: 0; background: var(--cream); font-family: 'Noto Serif TC', serif; scroll-behavior: smooth; }
        
        section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }

        /* 第一部分：動態帷幕 */
        #part1 { background: #000; z-index: 10; }
        .curtain-wrapper { position: absolute; width: 100%; height: 100%; display: flex; cursor: pointer; z-index: 20; }
        .curtain { width: 50%; height: 100%; background: var(--burgundy); transition: transform 1.8s ease; display: flex; align-items: center; justify-content: center; border: 1px solid var(--gold); }
        .curtain-text { color: var(--gold); font-size: 1.5rem; writing-mode: vertical-rl; letter-spacing: 5px; }
        .opened .curtain-left { transform: translateX(-100%); }
        .opened .curtain-right { transform: translateX(100%); }
        .hero-bg { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .hero-text { position: absolute; color: white; text-align: center; z-index: 15; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* 第二部分：刮刮樂與倒數 */
        #part2 { background: white; padding: 50px 0; }
        #scratch-container { position: relative; width: 320px; height: 320px; border-radius: 50%; overflow: hidden; border: 4px solid var(--gold); margin: 20px 0; }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; touch-action: none; }
        .countdown-timer { display: flex; gap: 15px; margin-top: 20px; }
        .timer-box { background: var(--burgundy); color: white; padding: 10px; border-radius: 8px; min-width: 60px; text-align: center; }

        /* 第三部分：電子喜帖質感外框 */
        #part3 { background: var(--cream); padding: 40px; }
        .invitation-frame { border: 2px solid var(--gold); padding: 40px 20px; max-width: 500px; width: 90%; background: white; position: relative; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .invitation-frame::before { content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 1px solid var(--gold); pointer-events: none; }

        /* 第四部分：輪播/影片 */
        #part4 { background: #eee; }
        .media-container { width: 90%; max-width: 800px; height: 450px; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <!-- 第一部分 -->
    <section id="part1">
        <div class="curtain-wrapper" onclick="this.parentElement.classList.add('opened'); document.getElementById('bgm').play();">
            <div class="curtain curtain-left"><div class="curtain-text">摯愛的親友</div></div>
            <div class="curtain curtain-right"><div class="curtain-text">誠摯邀請您</div></div>
        </div>
        <img src="hero-photo.jpg" class="hero-bg" alt="Cover Photo">
        <div class="hero-text">
            <h1>We Are Getting Married</h1>
            <p>向下捲動開啟樂章</p>
        </div>
    </section>

    <!-- 第二部分 -->
    <section id="part2">
        <h2>解鎖專屬驚喜</h2>
        <div id="scratch-container">
            <div class="reveal-content" style="width:100%; height:100%;"><img src="main-image.jpg" style="width:100%; height:100%; object-fit:cover;"></div>
            <canvas id="scratch-canvas" width="320" height="320"></canvas>
        </div>
        <div class="countdown-timer" id="timer">
            <div class="timer-box"><span id="days">00</span><br><small>Days</small></div>
            <div class="timer-box"><span id="hours">00</span><br><small>Hrs</small></div>
            <div class="timer-box"><span id="mins">00</span><br><small>Mins</small></div>
            <div class="timer-box"><span id="secs">00</span><br><small>Secs</small></div>
        </div>
    </section>

    <!-- 第三部分 -->
    <section id="part3">
        <div class="invitation-frame">
            <h2 style="color: var(--burgundy);">Invitation</h2>
            <p>內容文字藝術與故事呈現 (待更新)</p>
            <p>兩條線的交會，從台東開始...</p>
        </div>
    </section>

    <!-- 第四部分 -->
    <section id="part4">
        <h2>我們的回憶</h2>
        <div class="media-container">
            <!-- 可替換為 video 標籤或輪播圖 -->
            <video controls poster="video-cover.jpg">
                <source src="wedding-video.mp4" type="video/mp4">
                Your browser does not support video.
            </video>
        </div>
    </section>

    <script>
        // 倒數計時邏輯 (目標日期：2026/09/20)
        function updateTimer() {
            const target = new Date('September 20, 2026 00:00:00').getTime();
            const now = new Date().getTime();
            const diff = target - now;
            
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }
        setInterval(updateTimer, 1000);

        // 刮刮樂邏輯 (延續高畫質似顏繪)
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#d1d1d1';
        ctx.fillRect(0, 0, 320, 320);
        ctx.fillStyle = '#666'; ctx.textAlign = 'center'; ctx.fillText('親手刮開我們的回憶', 160, 160);

        function scratch(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI * 2); ctx.fill();
        }
        canvas.addEventListener('mousemove', (e) => { if(e.buttons===1) scratch(e); });
        canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });
    </script>
</body>
</html>
