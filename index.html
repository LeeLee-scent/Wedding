<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --burgundy: #800020; --cream: #fffcf9; }
        body, html { margin: 0; padding: 0; background: var(--cream); font-family: 'Noto Serif TC', serif; scroll-behavior: smooth; overflow-x: hidden; }
        section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }

        /* --- 第一部分：門縫式開場 --- */
        #part1 { background: #1a1a1a; z-index: 10; }
        .door-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; cursor: pointer; }
        .door { height: 50%; width: 100%; background: #1a1a1a; transition: transform 1.6s cubic-bezier(0.85, 0, 0.15, 1); display: flex; align-items: center; justify-content: center; position: relative; }
        .door-top { border-bottom: 0.5px solid var(--gold); align-items: flex-end; padding-bottom: 20px; }
        .door-bottom { border-top: 0.5px solid var(--gold); align-items: flex-start; padding-top: 20px; }
        .door-label { color: var(--gold); letter-spacing: 12px; font-weight: 300; font-size: 1.2rem; }
        .opened .door-top { transform: translateY(-100%); }
        .opened .door-bottom { transform: translateY(100%); }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('assets/hero-photo.jpg') center/cover no-repeat; opacity: 0; transition: opacity 2s ease 0.5s; }
        .opened .hero-bg { opacity: 0.75; }

        /* --- 第二部分：大方形刮刮樂 (含內嵌倒數) --- */
        #part2 { background: white; padding: 60px 0; }
        #scratch-wrapper { 
            position: relative; width: 90vw; max-width: 500px; aspect-ratio: 4/5; 
            border: 1px solid #eee; box-shadow: 0 15px 45px rgba(0,0,0,0.08); 
        }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; touch-action: none; width: 100%; height: 100%; }
        .reveal-box { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .reveal-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; z-index: -1; }
        .inner-timer { 
            background: rgba(255, 255, 255, 0.85); padding: 20px; border-radius: 5px; 
            display: flex; gap: 10px; color: var(--burgundy); 
        }

        /* --- 第三部分：正式喜帖格式 --- */
        .invitation-card { 
            border: 2px double var(--gold); padding: 60px 40px; max-width: 500px; width: 85%; 
            background: white; text-align: center; line-height: 2.5; position: relative;
        }
        .invitation-card h2 { margin-bottom: 30px; letter-spacing: 10px; color: var(--burgundy); }

        /* --- 第四部分：四格相片 --- */
        .photo-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 90%; max-width: 800px; padding: 20px; 
        }
        .grid-item { aspect-ratio: 1/1; background: #eee; overflow: hidden; border: 1px solid #ddd; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .grid-item img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto"><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

    <!-- 第一部分：門縫開場 -->
    <section id="part1">
        <div class="door-overlay" onclick="startExperience(this)">
            <div class="door door-top"><div class="door-label">THE WEDDING</div></div>
            <div class="door door-bottom"><div class="door-label">ADVENTURE</div></div>
        </div>
        <div class="hero-bg"></div>
    </section>

    <!-- 第二部分：方形刮刮樂內嵌倒數 -->
    <section id="part2">
        <div id="scratch-wrapper">
            <div class="reveal-box">
                <img src="assets/main-image.jpg" alt="Reveal Photo">
                <div class="inner-timer" id="timer">
                    <div style="text-align:center;"><span id="days" style="font-size:1.5rem; font-weight:bold;">00</span><br><small>DAYS</small></div>
                    <div style="text-align:center;"><span id="hours" style="font-size:1.5rem; font-weight:bold;">00</span><br><small>HRS</small></div>
                    <div style="text-align:center;"><span id="mins" style="font-size:1.5rem; font-weight:bold;">00</span><br><small>MINS</small></div>
                </div>
            </div>
            <canvas id="scratch-canvas"></canvas>
        </div>
        <p style="margin-top: 20px; color: #888; font-size: 0.9rem;">— 刮開畫布 揭曉時間與回憶 —</p>
    </section>

    <!-- 第三部分：正式喜帖格式 -->
    <section id="part3">
        <div class="invitation-card">
            <h2>謹謝。親恩</h2>
            <p style="font-size: 1.1rem; letter-spacing: 2px;">
                <strong>新郎：李先生 &nbsp; 新娘：林小姐</strong><br>
                奉天承運。連理結盟
            </p>
            <p style="font-size: 0.95rem;">
                我們將於 <strong>2026 年 10 月 03 日</strong>（星期六）<br>
                舉行結婚典禮。誠邀各位親友蒞臨同慶<br><br>
                <strong>【 席設 】</strong><br>
                新店彭園會館<br>
                新北市新店區北新路三段219號2樓
            </p>
            <p style="font-size: 0.9rem; color: var(--gold); margin-top: 30px;">
                12:00 入席  |  12:30 準時開席
            </p>
        </div>
    </section>

    <!-- 第四部分：四格相片牆 -->
    <section id="part4">
        <h3 style="letter-spacing: 5px; color: var(--burgundy);">GALLERY</h3>
        <div class="photo-grid">
            <div class="grid-item"><img src="assets/photo1.jpg" alt="Memory 1"></div>
            <div class="grid-item"><img src="assets/photo2.jpg" alt="Memory 2"></div>
            <div class="grid-item"><img src="assets/photo3.jpg" alt="Memory 3"></div>
            <div class="grid-item"><img src="assets/photo4.jpg" alt="Memory 4"></div>
        </div>
    </section>

    <script>
        function startExperience(el) {
            el.parentElement.classList.add('opened');
            document.getElementById('bgm').play();
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }

        // 方形刮刮樂
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('scratch-wrapper');

        function initCanvas() {
            canvas.width = wrapper.offsetWidth;
            canvas.height = wrapper.offsetHeight;
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#999';
            ctx.font = '20px "Noto Serif TC"';
            ctx.textAlign = 'center';
            ctx.fillText('親手刮開我們的驚喜', canvas.width/2, canvas.height/2);
        }

        function handleScratch(e) {
            const r = canvas.getBoundingClientRect();
            const x = ((e.clientX || (e.touches && e.touches[0].clientX)) - r.left);
            const y = ((e.clientY || (e.touches && e.touches[0].clientY)) - r.top);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 45, 0, Math.PI*2); ctx.fill();
        }

        canvas.addEventListener('mousemove', (e) => { if(e.buttons===1) handleScratch(e); });
        canvas.addEventListener('touchmove', (e) => { handleScratch(e); e.preventDefault(); });
        window.addEventListener('load', initCanvas);
        window.addEventListener('resize', initCanvas);

        // 倒數計時器邏輯
        function updateTimer() {
            const diff = new Date('2026-10-03T12:00:00') - new Date();
            if (diff <= 0) return;
            document.getElementById('days').innerText = String(Math.floor(diff / 864e5)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 864e5) / 36e5)).padStart(2, '0');
            document.getElementById('mins').innerText = String(Math.floor((diff % 36e5) / 6e4)).padStart(2, '0');
        }
        setInterval(updateTimer, 1000); updateTimer();
    </script>
</body>
</html>
