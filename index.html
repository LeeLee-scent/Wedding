<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a368; 
            --gold-light: rgba(197, 163, 104, 0.3);
            --cream-bg: #fdfaf5;
            --text-dark: #5d4037;
            --white-glass: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--cream-bg); font-family: 'Noto Serif TC', serif; overflow-x: hidden; scroll-behavior: smooth; color: var(--text-dark); }
        
        /* 提升流暢度：進場動畫 */
        .fade-in-section { opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
        .fade-in-section.visible { opacity: 1; transform: translateY(0); }

        section { min-height: 85vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 60px 20px; }

        /* 第一部分：開門 (加入視差潛力) */
        #part1 { background: #2c1b18; min-height: 100vh; padding: 0; z-index: 10; overflow: hidden; }
        .door { height: 50.5%; width: 100%; z-index: 20; position: absolute; left: 0; background: url('assets/wood-texture.jpg') center/cover; transition: transform 2.8s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .door-top { top: 0; border-bottom: 1px solid rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5vh; }
        .door-bottom { bottom: 0; border-top: 1px solid rgba(0,0,0,0.4); display: flex; align-items: flex-start; justify-content: center; padding-top: 5vh; }
        .opened .door-top { transform: translateY(-100%); }
        .opened .door-bottom { transform: translateY(100%); }
        .door-label { color: #fff; letter-spacing: 10px; font-family: 'Dancing Script', cursive; font-size: 1.4rem; opacity: 0.8; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        #hero-img { position: absolute; width: 100%; height: 110%; top: -5%; background: url('assets/hero-photo.jpg') center/cover; opacity: 0; transition: opacity 3s ease, transform 10s linear; }
        .opened #hero-img { opacity: 0.75; transform: scale(1.05); }

        /* 第二部分：刮刮樂 */
        #scratch-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1.2; box-shadow: 0 20px 40px rgba(0,0,0,0.15); background: #fff; border-radius: 8px; overflow: hidden; }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; cursor: crosshair; }
        .timer-box { height: 20%; display: flex; justify-content: center; align-items: center; gap: 20px; background: #fff; border-top: 1px solid #f0f0f0; }
        .timer-unit { text-align: center; font-size: 0.8rem; letter-spacing: 1px; }
        .timer-unit span { font-weight: 700; font-size: 1.4rem; color: var(--gold); display: block; }

        /* 第三部分：大理石卡片 (質感加強) */
        .invitation-frame { 
            padding: 60px 35px; width: 100%; max-width: 440px; text-align: center;
            background: url('assets/marble-card.jpg') center/cover; border: 1px solid var(--gold);
            position: relative; box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .invitation-frame::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--white-glass); z-index: 0; }
        .invitation-content { position: relative; z-index: 1; }
        .invitation-frame::after { content: ""; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; border: 1px solid var(--gold-light); pointer-events: none; }
        
        .handwritten-title { font-weight: 700; font-size: 2.8rem; color: var(--text-dark); margin-bottom: 25px; letter-spacing: 4px; }

        /* 第四部分：影音區 */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin-bottom: 40px; }
        .photo-grid img { width: 100%; height: 220px; object-fit: cover; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: transform 0.5s ease; }
        .photo-grid img:hover { transform: scale(1.02); }
        .video-container { width: 100%; max-width: 600px; border-radius: 12px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.15); border: 4px solid #fff; }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

    <section id="part1">
        <div class="door-overlay" onclick="startExperience(this)" style="position: absolute; width: 100%; height: 100%; z-index: 30;">
            <div class="door door-top"><div class="door-label">The Wedding Day</div></div>
            <div class="door door-bottom"><div class="door-label">Save The Date</div></div>
        </div>
        <div id="hero-img"></div>
        <div id="hero-text" style="position: absolute; z-index: 15; text-align: center; color: white; opacity: 0; transition: 2.5s 1.2s;">
            <h1 style="font-family: 'Dancing Script', cursive; font-size: 3.8rem; margin: 0; text-shadow: 0 2px 15px rgba(0,0,0,0.3);">Lin & Lee</h1>
            <p style="letter-spacing: 6px; font-weight: 300;">2026 . 10 . 03</p>
        </div>
    </section>

    <section id="part2" class="fade-in-section">
        <div id="scratch-container">
            <img src="assets/main-image.jpg" style="width:100%; height:80%; object-fit:cover;">
            <div class="timer-box">
                <div class="timer-unit"><span id="days">00</span>DAYS</div>
                <div class="timer-unit"><span id="hours">00</span>HRS</div>
                <div class="timer-unit"><span id="mins">00</span>MINS</div>
                <div class="timer-unit"><span id="secs">00</span>SECS</div>
            </div>
            <canvas id="scratch-canvas"></canvas>
        </div>
    </section>

    <section id="part3" class="fade-in-section">
        <div class="invitation-frame">
            <div class="invitation-content">
                <div class="handwritten-title">誠摯邀請</div>
                <p style="font-size: 1.2rem; letter-spacing: 2px;"><strong>林建安 & 李抒琪</strong></p>
                <p style="line-height: 2.4; color: #444; margin-top: 20px;">
                    在台東海邊遇見了你<br>
                    從此我們的世界有了旋律<br>
                    誠摯邀請您見證我們的幸福時刻<br><br>
                    <span style="border-bottom: 1px solid var(--gold); padding-bottom: 5px;"><strong>2026 年 10 月 03 日</strong></span><br>
                    18:30 入席 | 八德彭園會館
                </p>
            </div>
        </div>
    </section>

    <section id="part4" class="fade-in-section">
        <div class="photo-grid">
            <img src="assets/photo1.jpg"> <img src="assets/photo2.jpg">
            <img src="assets/photo3.jpg"> <img src="assets/photo4.jpg">
        </div>
        <div class="video-container">
            <video controls width="100%" poster="assets/video-poster.jpg" playsinline>
                <source src="assets/wedding-video.mp4" type="video/mp4">
            </video>
        </div>
    </section>

    <script>
        function startExperience(el) {
            el.parentElement.classList.add('opened');
            document.getElementById('hero-text').style.opacity = "1";
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5;
            bgm.play().catch(()=>{ console.log("Audio play blocked by browser"); });
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.15 });
        document.querySelectorAll('.fade-in-section').forEach(section => observer.observe(section));

        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('scratch-container');

        function initScratch() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#d4d4d4');
            grad.addColorStop(0.5, '#f5f5f5');
            grad.addColorStop(1, '#bcbcbc');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i=0; i<200; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.6)' : 'rgba(197, 163, 104, 0.4)';
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.8, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.fillStyle = '#5d4037';
            ctx.font = '700 22px "Noto Serif TC"';
            ctx.textAlign = 'center';
            ctx.fillText('刮開揭曉驚喜', canvas.width/2, canvas.height/2 + 8);
        }
        window.addEventListener('load', initScratch);
        window.addEventListener('resize', initScratch);

        function handleScratch(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 38, 0, Math.PI * 2);
            ctx.fill();
        }
        canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleScratch(e); });
        canvas.addEventListener('touchmove', (e) => { handleScratch(e); e.preventDefault(); }, { passive: false });

        function updateTimer() {
            const target = new Date('2026-10-03T18:30:00'); // 更新為晚上入席時間
            const now = new Date();
            const diff = target - now;
            if (diff <= 0) return;
            document.getElementById('days').innerText = String(Math.floor(diff / 864e5)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 864e5) / 36e5)).padStart(2, '0');
            document.getElementById('mins').innerText = String(Math.floor((diff % 36e5) / 6e4)).padStart(2, '0');
            document.getElementById('secs').innerText = String(Math.floor((diff % 6e4) / 1000)).padStart(2, '0');
        }
        setInterval(updateTimer, 1000); updateTimer();
    </script>
</body>
</html>
