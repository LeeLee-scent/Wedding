<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>An & Chi Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a368; --cream-bg: #fdfaf5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Noto Serif TC', serif; overflow-x: hidden; }

        /* --- 1. 極致立體信封開場 --- */
        #envelope-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 9999;
            perspective: 3500px;
            background: #fff;
            /* 4秒開始整體淡出 */
            transition: opacity 2s ease 4s, visibility 2s ease 4s; 
        }

        .envelope-back {
            position: absolute;
            width: 100%; height: 100vh;
            background: url('assets/envelope-back.jpg') center/cover no-repeat;
            z-index: 1;
        }

        /* 下半部三角形：50% 對稱比例 + 極重陰影 */
        .envelope-bottom-flap {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: #fff url('assets/envelope-bottom.png') center top/cover;
            z-index: 10;
            clip-path: polygon(0 0, 50% 100%, 100% 0, 100% 100%, 0 100%);
            /* 將三角形反轉以達成對稱：尖端向上 */
            clip-path: polygon(0 50%, 50% 0, 100% 50%, 100% 100%, 0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-top: 60px;
            /* 多重超深陰影 */
            filter: drop-shadow(0 -10px 20px rgba(0,0,0,0.2)) 
                    drop-shadow(0 -20px 40px rgba(0,0,0,0.15));
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1) 0.5s;
        }

        /* 上半部群組：50% 對稱比例 */
        .envelope-top-group {
            position: absolute;
            top: 0; width: 100%; height: 50%; 
            z-index: 25;
            transform-origin: top;
            /* 翻轉速度調得更慢 */
            transition: transform 5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope-top-flap {
            position: absolute;
            width: 100%; height: 100%;
            background: #fff url('assets/envelope-top.png') center bottom/cover;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            /* 強化上蓋壓在下方的深色陰影 */
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.25)) 
                    drop-shadow(0 30px 60px rgba(0,0,0,0.2)); 
        }

        /* 250px 巨型封蠟 */
        .seal-btn {
            position: absolute;
            bottom: -125px; /* 寬度一半左右的位置 */
            left: 50%;
            transform: translateX(-50%);
            width: 250px; 
            z-index: 30;
            /* 封蠟深邃陰影 */
            filter: drop-shadow(0 12px 25px rgba(0,0,0,0.4));
            transition: opacity 1.5s ease 2.5s;
            cursor: pointer;
        }

        /* 動態開啟 */
        .opened .envelope-top-group { transform: rotateX(160deg); }
        .opened .seal-btn { opacity: 0; pointer-events: none; }
        .opened .envelope-bottom-flap { transform: translateY(100%); }
        .opened#envelope-wrapper { opacity: 0; visibility: hidden; }

        /* --- 2. 後方內容區 --- */
        #main-content { opacity: 0; transition: opacity 2s ease 3s; position: relative; z-index: 5; }
        .visible#main-content { opacity: 1; }
        
        #hero-section { 
            height: 100vh; width: 100%; 
            background: url('assets/hero-photo.jpg') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

    <div id="envelope-wrapper" onclick="startWedding()">
        <div class="envelope-back"></div>
        <div class="envelope-top-group">
            <div class="envelope-top-flap"></div>
            <img src="assets/seal.png" class="seal-btn" alt="Seal">
        </div>
        <div class="envelope-bottom-flap">
            <h2 style="font-size: 1.6rem; color: #8d7b6d; font-weight: 400; letter-spacing: 4px;">An & Chi</h2>
            <p style="font-size: 1.1rem; color: #8d7b6d; margin-top: 10px;">2026.10.03</p>
        </div>
    </div>

    <main id="main-content">
        <section id="hero-section">
            <h1 style="font-family: 'Dancing Script', cursive; font-size: 5rem; color: white; text-shadow: 0 4px 30px rgba(0,0,0,0.5);">An & Chi</h1>
        </section>
        <!-- 續接後續部分... -->
    </main>

    <script>
        function startWedding() {
            const wrapper = document.getElementById('envelope-wrapper');
            const mainContent = document.getElementById('main-content');
            
            if (!wrapper.classList.contains('opened')) {
                wrapper.classList.add('opened');
                document.getElementById('bgm').play().catch(()=>{});
                mainContent.classList.add('visible');

                // 4秒後信封層開始淡出，為了不擋住點擊，於設定時間後移除
                setTimeout(() => {
                    wrapper.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }, 6000); 
            }
        }
    </script>
</body>
</html>
