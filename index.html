<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>An & Chi Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a368; --cream-bg: #fdfaf5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Noto Serif TC', serif; overflow-x: hidden; }

        /* --- 1. 梯形信封層級 (上浮感設計) --- */
        #envelope-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 9999;
            perspective: 3500px;
            background: #fff;
            transition: opacity 2.5s ease 4s, visibility 2.5s ease 4s; 
        }

        .envelope-back {
            position: absolute;
            width: 100%; height: 100%;
            background: url('assets/envelope-back.jpg') center/cover no-repeat;
            z-index: 1;
        }

        /* 下半部：梯形設計 + 強力上浮陰影 */
        .envelope-bottom-flap {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: #fff url('assets/envelope-bottom.png') center top/cover;
            z-index: 10;
            /* 修改為梯形 clip-path */
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            /* 強化上浮陰影：深黑色擴散 */
            filter: drop-shadow(0 -15px 25px rgba(0,0,0,0.3)) 
                    drop-shadow(0 -30px 60px rgba(0,0,0,0.2));
            transition: transform 3.5s cubic-bezier(0.4, 0, 0.2, 1) 1s;
        }

        /* 上半部群組：對稱梯形 */
        .envelope-top-group {
            position: absolute;
            top: 0; width: 100%; height: 50%; 
            z-index: 25;
            transform-origin: top;
            transition: transform 6s cubic-bezier(0.4, 0, 0.2, 1); /* 開啟速度極慢 */
        }

        .envelope-top-flap {
            position: absolute;
            width: 100%; height: 100%;
            background: #fff url('assets/envelope-top.png') center bottom/cover;
            /* 修改為梯形 clip-path */
            clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 15% 100%);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.35)) 
                    drop-shadow(0 40px 80px rgba(0,0,0,0.25)); 
        }

        /* 250px 巨型封蠟 */
        .seal-btn {
            position: absolute;
            bottom: -125px; 
            left: 50%;
            transform: translateX(-50%);
            width: 250px; 
            z-index: 30;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
            transition: opacity 1.5s ease 3s;
            cursor: pointer;
        }

        /* 開啟動畫 */
        .opened .envelope-top-group { transform: rotateX(160deg); }
        .opened .seal-btn { opacity: 0; pointer-events: none; }
        .opened .envelope-bottom-flap { transform: translateY(100%); }
        .opened#envelope-wrapper { opacity: 0; visibility: hidden; }

        /* --- 2. 原始設計內容區 (完全保留不更動) --- */
        #main-content { opacity: 0; transition: opacity 2.5s ease 3s; position: relative; z-index: 5; }
        .visible#main-content { opacity: 1; }

        /* 您原有的刮刮樂點點、亮粉與設計樣式請保留於下方... */
        #scratch-container {
            /* 確保維持原本的閃亮效果設定 */
            background: radial-gradient(circle at 50% 50%, #fff 0%, #f0f0f0 100%);
            /* ...其餘原始 CSS... */
        }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

    <!-- 信封層 -->
    <div id="envelope-wrapper" onclick="startWedding()">
        <div class="envelope-back"></div>
        <div class="envelope-top-group">
            <div class="envelope-top-flap"></div>
            <img src="assets/seal.png" class="seal-btn" alt="Seal">
        </div>
        <div class="envelope-bottom-flap">
            <h2 style="font-size: 1.6rem; color: #8d7b6d; font-weight: 400; letter-spacing: 4px;">An & Chi</h2>
            <p style="font-size: 1.1rem; color: #8d7b6d; margin-top: 10px;">2026.10.03</p>
        </div>
    </div>

    <!-- 原始設計內容 (第二、三、四部分) -->
    <main id="main-content">
        <!-- 此處放置您原本的內容代碼，包含所有刮刮樂 Canvas 與閃亮裝飾 -->
    </main>

    <script>
        function startWedding() {
            const wrapper = document.getElementById('envelope-wrapper');
            const mainContent = document.getElementById('main-content');
            
            if (!wrapper.classList.contains('opened')) {
                wrapper.classList.add('opened');
                document.getElementById('bgm').play().catch(()=>{});
                mainContent.classList.add('visible');

                // 動畫結束後移除遮擋，恢復原始網頁功能
                setTimeout(() => {
                    wrapper.style.display = 'none';
                    document.body.style.overflow = 'auto';
                    // 觸發原始刮刮樂初始化（如果有的話）
                    if (typeof initScratch === "function") initScratch();
                }, 7000); 
            }
        }
    </script>
</body>
</html>
