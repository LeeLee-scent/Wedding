<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>An & Chi Wedding Invitation</title>
    
    <meta property="og:url" content="https://leelee-scent.github.io/Wedding/">
    <meta property="og:title" content="An & Chi Wedding Invitation">
    <meta property="og:description" content="誠摯邀請您見證我們的幸福時刻 - 2026.10.03">
    <meta property="og:image" content="https://leelee-scent.github.io/Wedding/assets/og-preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a368; --text-color: #8d7b6d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* --- 背景質感：手感紙紋理 --- */
        body, html { 
            margin: 0; padding: 0; 
            background-color: #f4f1ea; 
            background-image: url('assets/paper-texture.jpg');
            background-size: 400px auto; 
            background-repeat: repeat;
            background-attachment: fixed;
            font-family: 'Noto Serif TC', serif; 
            overflow-x: hidden; 
        }

        /* --- 1. 3D 信封與光影昇華特效 (鎖定 0506 版設計) --- */
        #envelope-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            z-index: 9999; perspective: 2500px; 
            background: transparent; 
            transition: opacity 2s ease 3.5s, visibility 2s ease 3.5s;
        }

        .envelope-back {
            position: absolute; width: 100%; height: 100vh;
            background: url('assets/envelope-back.webp') center/cover no-repeat;
            z-index: 1;
            transition: opacity 3.5s ease-in-out 0.5s, transform 3.5s ease-in-out 0.5s, filter 3.5s ease-in-out 0.5s;
        }

        .envelope-bottom-flap {
            position: absolute; bottom: 0; width: 100%; height: 55%;
            background: #fff url('assets/envelope-bottom.webp') center top/cover no-repeat;
            z-index: 10;
            clip-path: polygon(0 100%, 100% 100%, 100% 35%, 50% 0%, 0 35%);
            filter: drop-shadow(0 -5px 15px rgba(0,0,0,0.1));
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 8vh;
            transition: opacity 3.5s ease-in-out 0.5s, transform 3.5s ease-in-out 0.5s;
        }

        .envelope-top-group {
            position: absolute; top: 0; width: 100%; height: 50%; 
            z-index: 25; transform-origin: top;
            transform-style: preserve-3d;
            transition: transform 5.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope-top-flap {
            position: absolute; width: 100%; height: 100%;
            background: #fff url('assets/envelope-top.webp') center bottom/cover no-repeat;
            clip-path: polygon(0 0, 100% 0, 100% 60%, 50% 100%, 0 60%);
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3)); 
            backface-visibility: hidden;
        }

        .seal-btn {
            position: absolute; bottom: -110px; left: 50%; transform: translateX(-50%);
            width: 250px; z-index: 30;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.4));
            cursor: pointer;
            transition: opacity 2s ease 3s; 
        }

        .opened .envelope-top-group { transform: rotateX(160deg); }
        .opened .seal-btn { opacity: 0; }
        .opened .envelope-back { opacity: 0; transform: translateY(-60px); filter: brightness(1.6) blur(4px); }
        .opened .envelope-bottom-flap { opacity: 0; transform: translateY(-40px); }
        .opened#envelope-wrapper { opacity: 0; visibility: hidden; }

        /* --- 2. 內容區域 --- */
        #main-content { opacity: 0; transition: opacity 2s ease 1s; position: relative; z-index: 5; }
        .visible#main-content { opacity: 1; }

        #hero-section { height: 100vh; width: 100%; background: url('assets/hero-photo.webp') center/cover; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- 新增：首頁文字升起動畫 --- */
        .hero-text-container {
            text-align: center; color: white; position: relative; z-index: 10;
            opacity: 0;
            transform: translateY(100px); /* 初始位置在下方 100px */
            /* 設定緩緩升起的效果：持續 2.5 秒，並延遲 1.5 秒啟動（配合信封昇華特效） */
            transition: opacity 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) 1.5s, 
                        transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) 1.5s;
        }
        /* 當主內容變為可見時觸發升起 */
        .visible .hero-text-container {
            opacity: 1;
            transform: translateY(0);
        }

        .fade-in-section { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .fade-in-section.active { opacity: 1; transform: translateY(0); }
        section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
        
        #scratch-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1.2; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; cursor: crosshair; }
        
        .invitation-frame { 
            padding: 60px 35px; width: 100%; max-width: 450px; 
            text-align: center; background: rgba(255, 255, 255, 0.8); 
            border: 1px solid var(--gold); backdrop-filter: blur(2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; margin-bottom: 40px; }
        .photo-grid img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; }
        .video-container { width: 100%; max-width: 600px; border-radius: 12px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <audio id="bgm" loop><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

    <div id="envelope-wrapper" onclick="startWedding()">
        <div class="envelope-back"></div>
        <div class="envelope-top-group">
            <div class="envelope-top-flap"></div>
            <img src="assets/seal.webp" class="seal-btn" alt="A&C Seal">
        </div>
        <div class="envelope-bottom-flap">
            <h2 style="font-size: 1.6rem; color: #8d7b6d; font-weight: 400; letter-spacing: 4px; margin: 0;">An & Chi</h2>
            <p style="font-size: 1.1rem; color: #8d7b6d; margin-top: 10px; letter-spacing: 2px;">2026.10.03</p>
        </div>
    </div>

    <main id="main-content">
        <section id="hero-section">
            <div class="hero-text-container">
                <h1 style="font-family: 'Dancing Script', cursive; font-size: 4.5rem; margin: 0;">An & Chi</h1>
                <p style="letter-spacing: 8px; font-weight: 300; margin-top: 15px;">2026 . 10 . 03</p>
            </div>
        </section>

        <section id="part2" class="fade-in-section">
            <div id="scratch-container">
                <img src="assets/main-image.webp" style="width:100%; height:82%; object-fit:cover;">
                <div style="height:18%; display:flex; justify-content:center; align-items:center; gap:15px; background:#fff;">
                    <div style="text-align:center;"><span id="days" style="font-weight:700; color:var(--gold);">00</span><br><small>DAYS</small></div>
                    <div style="text-align:center;"><span id="hours" style="font-weight:700; color:var(--gold);">00</span><br><small>HRS</small></div>
                    <div style="text-align:center;"><span id="mins" style="font-weight:700; color:var(--gold);">00</span><br><small>MINS</small></div>
                    <div style="text-align:center;"><span id="secs" style="font-weight:700; color:var(--gold);">00</span><br><small>SECS</small></div>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>
        </section>

        <section id="part3" class="fade-in-section">
            <div class="invitation-frame">
                <h2 style="font-size: 2.8rem; margin-bottom: 25px;">誠摯邀請</h2>
                <p style="font-size: 1.2rem; letter-spacing: 2px;"><strong>林建安 & 李抒琪</strong></p>
                <p style="line-height: 2.4; color: #444; margin-top: 20px;">
                    在台東海邊遇見了你<br>
                    從此我們的世界有了旋律<br>
                    誠摯邀請您見證我們的幸福時刻<br><br>
                    <strong>2026 年 10 月 03 日</strong><br>
                    18:30 入席 | 八德彭園會館
                </p>
            </div>
        </section>

        <section id="part4" class="fade-in-section">
            <div class="photo-grid">
                <img src="assets/photo1.webp"> <img src="assets/photo2.webp">
                <img src="assets/photo3.webp"> <img src="assets/photo4.webp">
            </div>
            <div class="video-container">
                <video controls width="100%" poster="assets/video-poster.webp" playsinline>
                    <source src="assets/wedding-video.mp4" type="video/mp4">
                </video>
            </div>
        </section>
    </main>

    <script>
        function startWedding() {
            const wrapper = document.getElementById('envelope-wrapper');
            const mainContent = document.getElementById('main-content');
            if (!wrapper.classList.contains('opened')) {
                wrapper.classList.add('opened');
                document.getElementById('bgm').play().catch(()=>{});
                mainContent.classList.add('visible');
                setTimeout(() => {
                    wrapper.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }, 5000); 
            }
        }

        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('scratch-container');
        let isDrawing = false;
        let lastX, lastY;

        window.onload = () => {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#d1d1d1'); grad.addColorStop(0.5, '#f0f0f0'); grad.addColorStop(1, '#a9a9a9');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i = 0; i < 2500; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.6})`;
                const size = Math.random() * 1.8;
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, size, size);
            }
            updateTimer(); setInterval(updateTimer, 1000);
        };

        function getEventCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function scratch(x, y) {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.lineWidth = 110;
            ctx.beginPath();
            if (lastX !== undefined) { ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); }
            else { ctx.arc(x, y, 55, 0, Math.PI * 2); }
            ctx.stroke(); ctx.fill();
            lastX = x; lastY = y;
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; const coords = getEventCoords(e); lastX = coords.x; lastY = coords.y; });
        canvas.addEventListener('mousemove', (e) => { if(!isDrawing) return; const coords = getEventCoords(e); scratch(coords.x, coords.y); });
        window.addEventListener('mouseup', () => { isDrawing = false; lastX = undefined; lastY = undefined; });
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; const coords = getEventCoords(e); lastX = coords.x; lastY = coords.y; e.preventDefault(); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { if(!isDrawing) return; const coords = getEventCoords(e); scratch(coords.x, coords.y); e.preventDefault(); }, { passive: false });
        canvas.addEventListener('touchend', () => { isDrawing = false; lastX = undefined; lastY = undefined; });

        function updateTimer() {
            const targetDate = new Date('2026-10-03T18:30:00');
            const diff = targetDate - new Date();
            if (diff <= 0) return;
            document.getElementById('days').innerText = String(Math.floor(diff / 864e5)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 864e5) / 36e5)).padStart(2, '0');
            document.getElementById('mins').innerText = String(Math.floor((diff % 36e5) / 6e4)).padStart(2, '0');
            document.getElementById('secs').innerText = String(Math.floor((diff % 6e4) / 1000)).padStart(2, '0');
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in-section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
